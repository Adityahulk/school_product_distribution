<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Driver · School Delivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <span class="title">🚚 Delivery</span>
      <span class="spacer"></span>
      <span class="stat">Block <b id="blockName">–</b></span>
      <span class="stat">Done <b id="doneCount">–</b>/<b id="totalCount">–</b></span>
      <span class="stat">· <b id="distKm">0</b> km</span>
      <button class="secondary" id="logout" style="padding:8px 12px">Exit</button>
    </div>

    <div id="map"></div>

    <div class="driver-bottom">
      <div class="next-card" id="nextCard">
        <div class="label">Next nearest school</div>
        <div class="nm" id="nextName">Locating you…</div>
        <div class="meta" id="nextMeta"></div>
      </div>
      <div class="row">
        <button class="secondary" id="navBtn" disabled>🧭 Navigate</button>
        <button class="green" id="checkinBtn" disabled>📷 Check in &amp; deliver</button>
      </div>
      <button class="secondary wide-action" id="issueBtn" type="button" disabled>School closed / issue</button>
      <div class="test-panel" id="testPanel" hidden>
        <div class="label">Test mode</div>
        <div class="row compact">
          <button class="secondary" id="testGujaratBtn" type="button">Use Gujarat</button>
          <button class="secondary" id="testArriveBtn" type="button" disabled>Simulate arrival</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Check-in modal -->
  <div class="modal-bg" id="modalBg">
    <form class="modal" id="checkinForm">
      <h3 id="ciTitle">Check in</h3>
      <p class="muted" id="ciSub"></p>
      <label>School name board photo</label>
      <input type="file" name="school_photo" accept="image/*" capture="environment" required />
      <label>Delivery photo</label>
      <input type="file" name="delivery_photo" accept="image/*" capture="environment" required />
      <label>Certificate photo (optional)</label>
      <input type="file" name="certificate_photo" accept="image/*" capture="environment" />
      <label>Certificate remarks</label>
      <textarea name="certificate_remarks" rows="3" placeholder="Certificate not received but tables delivered"></textarea>
      <p class="err" id="ciErr"></p>
      <div class="row">
        <button type="button" class="secondary" id="ciCancel">Cancel</button>
        <button type="submit" class="green" id="ciSubmit">Confirm delivered</button>
      </div>
    </form>
  </div>

  <div class="modal-bg" id="issueModalBg">
    <form class="modal" id="issueForm">
      <h3 id="issueTitle">School closed / issue</h3>
      <p class="muted" id="issueSub"></p>
      <label>Remarks</label>
      <textarea id="issueRemarks" name="remarks" rows="4" placeholder="School closed, no staff available, road blocked, etc."></textarea>
      <label>Photo 1</label>
      <input type="file" name="issue_photo_1" accept="image/*" capture="environment" required />
      <label>Photo 2 (optional)</label>
      <input type="file" name="issue_photo_2" accept="image/*" capture="environment" />
      <p class="err" id="issueErr"></p>
      <div class="row">
        <button type="button" class="secondary" id="issueCancel">Cancel</button>
        <button type="submit" class="green" id="issueSubmit">Submit issue</button>
      </div>
    </form>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/driver.js"></script>
</body>
</html>
