<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · School Delivery</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="admin">
    <div class="sidebar">
      <div style="display:flex;align-items:center;gap:8px">
        <strong style="font-size:16px">📊 Admin</strong>
        <span class="spacer" style="flex:1"></span>
        <button class="secondary" id="logout" style="padding:6px 10px">Log out</button>
      </div>

      <h2>Progress</h2>
      <div class="kpis">
        <div class="kpi"><div class="v" id="kVisited">–</div><div class="k">Delivered</div></div>
        <div class="kpi"><div class="v" id="kRemaining">–</div><div class="k">Remaining</div></div>
        <div class="kpi"><div class="v" id="kTotal">–</div><div class="k">Total</div></div>
      </div>

      <details class="admin-section">
        <summary>Blocks</summary>
        <div class="block-grid" id="blockList"></div>
      </details>

      <details class="admin-section">
        <summary>Drivers</summary>
        <div id="driverList"></div>
      </details>

      <details class="admin-section">
        <summary>Manual completion</summary>
        <form id="manualAdminForm">
          <select id="manualDriver" required>
            <option value="">Select driver</option>
          </select>
          <div style="height:6px"></div>
          <input id="manualSchoolSearch" placeholder="Search school" autocomplete="off" />
          <div style="height:6px"></div>
          <select id="manualAdminSchool" required>
            <option value="">Select school</option>
          </select>
          <label>School name board photo</label>
          <input type="file" name="school_photo" accept="image/*" required />
          <label>Delivery photo</label>
          <input type="file" name="delivery_photo" accept="image/*" required />
          <label>Certificate photo</label>
          <input type="file" name="certificate_photo" accept="image/*" required />
          <div style="height:8px"></div>
          <button type="submit" class="green" id="manualAdminSubmit" style="width:100%">Complete for driver</button>
          <p class="err" id="manualAdminErr"></p>
        </form>
      </details>

      <details class="admin-section">
        <summary>Toggled off schools</summary>
        <div id="heldSchoolList"></div>
      </details>

      <h2>Add driver</h2>
      <form id="addForm">
        <input id="dName" placeholder="Full name" />
        <div style="height:6px"></div>
        <select id="dBlock" required>
          <option value="">Select block</option>
        </select>
        <div style="height:6px"></div>
        <input id="dUser" placeholder="Username (login id)" autocapitalize="none" required />
        <div style="height:6px"></div>
        <input id="dPass" placeholder="Password" required />
        <div style="height:8px"></div>
        <label class="check-row"><input id="dTestMode" type="checkbox" /> Allow test mode</label>
        <div style="height:8px"></div>
        <button type="submit" style="width:100%">Create driver</button>
        <p class="err" id="addErr"></p>
      </form>

      <h2>Deliveries</h2>
      <div id="visitList"></div>
    </div>

    <div id="map"></div>
  </div>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="mTitle"></h3>
      <p class="muted" id="mSub"></p>
      <div class="muted">School name board photo</div>
      <img id="mSchool" alt="school" />
      <div class="muted" style="margin-top:10px">Delivery photo</div>
      <img id="mDelivery" alt="delivery" />
      <div class="muted" style="margin-top:10px">Certificate photo</div>
      <img id="mCertificate" alt="certificate" />
      <div style="height:12px"></div>
      <button class="secondary" id="mClose" style="width:100%">Close</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
